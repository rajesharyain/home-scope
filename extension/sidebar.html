<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HomeScope</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>

  <!-- ── Screens ───────────────────────────────────────────────────────────── -->
  <div class="sb-screens">

    <div id="screen-home" class="screen active"></div>

    <div id="screen-loading" class="screen">
      <div class="loading-screen">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-dot"></div>
        </div>
        <p id="loading-message" class="loading-msg">Locating address…</p>
        <p class="loading-hint">Analysing 7 livability dimensions</p>
      </div>
    </div>

    <div id="screen-results" class="screen">
      <div class="results-header">
        <button id="btn-results-back" class="btn-back">← Back</button>
        <div id="results-address" class="results-address-label"></div>
      </div>
      <div id="results-content" class="results-view active"></div>
    </div>

    <div id="screen-history" class="screen"></div>

    <div id="screen-settings" class="screen"></div>

    <div id="screen-explorer" class="screen"></div>

    <div id="screen-docs" class="screen"></div>

    <div id="screen-tutorial" class="screen"></div>

  </div>

  <script src="sidebar.js" type="module"></script>
</body>
</html>
