name: homescope
description: Know your neighborhood before you move.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # UI
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.1.0
  connectivity_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/config/
